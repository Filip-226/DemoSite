<body>

		<div class="account-pages"></div>
		<div class="clearfix"></div>
		<div class="wrapper-page">
			<div class="card-box">
				<div class="panel-heading">
					<h4 class="text-center"> Sign In to <strong class="text-custom">{SITE_NAME}</strong></h4>
				</div>


				<div class="p-20">
					<form class="form-horizontal m-t-20" method="post" action="login.html">

						<div>{ERROR}</div>
						<div class="form-group ">
							<div class="col-12">
								<input class="form-control" type="text" required="" placeholder="E-Mail address" name="email">
							</div>
						</div>

						<div class="form-group">
							<div class="col-12">
								<input class="form-control" type="password" required="" placeholder="Password" name="password">
							</div>
						</div>

						<div class="form-group ">
							<div class="col-12">
								<div class="checkbox checkbox-primary">
									<input id="checkbox-signup" type="checkbox" name="remember">
									<label for="checkbox-signup">
										Remember me
									</label>
								</div>

							</div>
						</div>

						<div class="form-group text-center m-t-40">
							<div class="col-12">
								<button class="btn btn-pink btn-block text-uppercase waves-effect waves-light" type="submit">Log In
								</button>
							</div>
						</div>

						<div class="form-group m-t-30 m-b-0">
							<div class="col-12">
								<a href="password-recovery.html" class="text-dark"><i class="fa fa-lock m-r-5"></i> Forgot
									your password?</a>
							</div>
						</div>
					</form>

				</div>
			</div>
		</div>
