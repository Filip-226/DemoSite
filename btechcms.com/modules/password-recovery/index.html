<body>

	<div class="account-pages"></div>
	<div class="clearfix"></div>
	<div class="wrapper-page">
		<div class=" card-box">
			<div class="panel-heading">
				<h4 class="text-center"> Reset Password </h4>
			</div>

			<div class="p-20">
				<form method="post" action="password-recovery.html" role="form" class="text-center">
					<div class="alert alert-info alert-dismissable">
						<button type="button" class="close" data-dismiss="alert" aria-hidden="true">
							×
						</button>
						{MESSAGE}
					</div>
					<div class="form-group m-b-0">
						<div class="input-group">
							<input type="email" class="form-control" placeholder="Enter Email" required="" name="email">
							<span class="input-group-btn">
								<button type="submit" class="btn btn-pink w-sm waves-effect waves-light">
									Reset
								</button> 
							</span>
						</div>
					</div>

						<div class="form-group m-t-30 m-b-0">
							<div class="col-12">
								<a href="login.html" class="text-dark"><i class="fa fa-lock m-r-5"></i> Back to login</a>
							</div>
						</div>
				</form>
			</div>
		</div>
		

	</div>
