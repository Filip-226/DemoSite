<div class="content-page">
		<!-- Start content -->
		<div class="content">
			<div class="container-fluid">

				<!-- Page-Title -->
				<div class="row">
					<div class="col-sm-12">
						<h4 class="page-title">Add a business</h4>
					</div>
				</div>


				<div class="row">
					<div class="col-md-12">

						<div class="card-box">
							<h4 class="header-title m-t-0">New Business Entry Form</h4>

							<ul class="form-errors">
								<:li tid="errors">{ERROR}<li:>
							</ul>
							
							<form id="basicForm" action="admin/businesses/add.html" method="post" enctype="multipart/form-data">
								<div class="form-group">
									<label for="businessName">Business Name<span class="text-danger">*</span></label>
									<input type="text" name="businessName" parsley-trigger="change" required
										placeholder="Enter Business name" class="form-control" id="businessName"
										value="{BUSINESSNAME}">
								</div>
								<div class="form-group">
										<label for="businessLogo">Business Logo<span class="text-danger">*</span></label>
										<input type="file" name="businessLogo" parsley-trigger="change" required placeholder="Select a file" class="form-control" id="businessLogo">
								</div>
								<div class="form-group">
									<label for="eMail">Owner's E-Mail address<span class="text-danger">*</span></label>
									<input name="email" id="eMail" type="text" placeholder="E-Mail Address" required class="form-control"
									value="{EMAIL}">
								</div>
								<div class="form-group">
									<label for="address">Owner's Street Address<span class="text-danger">*</span></label>
									<input name="owner_address" id="ownerAddress" type="text" placeholder="Owner Address" required class="form-control"
									value="{BUSNESS-ADDRESS}">
								</div>
								
								<div class="form-group">
									<label for="city">Owner's City<span class="text-danger">*</span></label>
									<input name="owner_city" id="ownerCity" type="text" placeholder="Owner City" required class="form-control"
									value="{BUSNESS-CITY}">
								</div>
								
								<div class="form-group">
									<label for="state">Owner's State<span class="text-danger">*</span></label>
									<input name="owner_state" id="ownerState" type="text" placeholder="Owner State" required class="form-control"
									value="{BUSNESS-STATE}">
								</div>
								
								<div class="form-group">
									<label for="zipcode">Owner's Zipcode<span class="text-danger">*</span></label>
									<input name="owner_address" id="ownerZipcode" type="text" placeholder="Owner Zip Code" required class="form-control"
									value="{BUSNESS-ZIPCODE}">
								</div>
								
								<div class="form-group">
									<label for="password">Owner's Password<span class="text-danger">*</span></label>
									<input type="password" required
										placeholder="Password" class="form-control" name="password" id="password">
								</div>
								
								<div class="form-group">
									<label for="phone">Owner's Phone number</label>
									<input type="text"
										placeholder="Phone number" class="form-control" name="phone" id="phone"
										value="{PHONE}">
								</div>
								

								<div class="form-group text-right m-b-0">
									<button class="btn btn-primary waves-effect waves-light" type="submit">
										Submit
									</button>
									<button type="reset" class="btn btn-secondary waves-effect m-l-5">
										Cancel
									</button>
								</div>

							</form>
						</div> <!-- end card-box -->
					</div>
					<!-- end col -->

					
				</div>
				<!-- end row -->

				

			</div> <!-- container -->

		</div> <!-- content -->
