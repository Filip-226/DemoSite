<div class="content-page">
		<!-- Start content -->
		<div class="content">
			<div class="container-fluid">

				<!-- Page-Title -->
				<div class="row">
					<div class="col-sm-12">
						<h4 class="page-title">Add a business</h4>
					</div>
				</div>


				<div class="row">
					<div class="col-md-12">

						<div class="card-box">
							<h4 class="header-title m-t-0">New Business Entry Form</h4>

							<ul class="form-errors">
								<:li tid="errors">{ERROR}<li:>
							</ul>
							<form id="basicForm" action="admin/businesses/edit/{ID}.html" method="post" enctype="multipart/form-data">
								<input type="hidden" name="id" value="{ID}" />
								<div class="form-group">
									<label for="businessName">Business Name<span class="text-danger">*</span></label>
									<input type="text" name="businessName" parsley-trigger="change" required
									value="{NAME}"
									placeholder="Enter Business name" class="form-control" id="businessName">
								</div>
								<div class="form-group">
									<div class="row">
										<div class="col-md-12 col-lg-6">
											<img src="{LOGO}" style="max-height: 200px; max-width: 400px;" />
										</div>
										<div class="col-md-12 col-lg-6">
											<label for="newLogo">Change Logo :</label>
											<input type="file" name="newLogo" parsley-trigger="change"
												placeholder="Select a file" class="form-control" id="newLogo">
										</div>
									</div>
								</div>
								<div class="form-group">
									<label for="eMail">Owner's E-Mail address<span class="text-danger">*</span></label>
									<input name="email" id="eMail" type="text" placeholder="E-Mail Address" required class="form-control" value="{EMAIL}" readonly>
								</div>
								<div class="form-group">
									<label for="phone">Owner's Phone number</label>
									<input type="text" readonly
										value="{PHONE}"
										placeholder="Phone number" class="form-control" name="phone" id="phone">
								</div>
								

								<div class="form-group text-right m-b-0">
									<button class="btn btn-primary waves-effect waves-light" type="submit">
										Submit
									</button>
									<button type="reset" class="btn btn-secondary waves-effect m-l-5">
										Cancel
									</button>
								</div>

							</form>
						</div> <!-- end card-box -->
					</div>
					<!-- end col -->

					
				</div>
				<!-- end row -->

				

			</div> <!-- container -->

		</div> <!-- content -->

		<footer class="footer text-right">
